<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Reset your {{ platform_name }} password</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1a1a1a;">
  <h2 style="color: #0d9488;">{{ platform_name }}</h2>
  <p>Hello,</p>
  <p>We received a request to reset your password. Click the button below to set a new one.</p>
  <p style="margin: 32px 0;">
    <a href="{{ reset_url }}"
       style="background-color: #0d9488; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold;">
      Reset Password
    </a>
  </p>
  <p style="color: #666; font-size: 14px;">This link expires in 1 hour. If you didn't request a password reset, you can safely ignore this email.</p>
  <p style="color: #999; font-size: 12px;">Or copy this URL: {{ reset_url }}</p>
</body>
</html>
