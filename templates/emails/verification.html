<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Verify your {{ platform_name }} account</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1a1a1a;">
  <h2 style="color: #0d9488;">{{ platform_name }}</h2>
  <p>Hello,</p>
  <p>Thank you for signing up. Please verify your email address to activate your account.</p>
  <p style="margin: 32px 0;">
    <a href="{{ verify_url }}"
       style="background-color: #0d9488; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold;">
      Verify Email Address
    </a>
  </p>
  <p style="color: #666; font-size: 14px;">This link expires in 24 hours. If you didn't create an account, you can safely ignore this email.</p>
  <p style="color: #999; font-size: 12px;">Or copy this URL: {{ verify_url }}</p>
</body>
</html>
